<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VPOS Docs – Value Tech Solutions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f7fa; color: #1a1a2e; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 20px;
    }
    h1 { font-size: 1.8rem; font-weight: 700; color: #0f3460; margin-bottom: 8px; }
    p  { color: #666; font-size: 0.95rem; margin-bottom: 32px; }
    .grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
    .card {
      background: #fff; border-radius: 12px; padding: 24px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); text-decoration: none;
      color: #1a1a2e; min-width: 200px; text-align: center;
      border: 2px solid transparent; transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover { border-color: #0f3460; transform: translateY(-2px); }
    .card .icon { font-size: 2rem; margin-bottom: 10px; }
    .card strong { display: block; font-size: 1rem; font-weight: 600; }
    .card span { font-size: 0.82rem; color: #888; margin-top: 4px; display: block; }
    footer { margin-top: 48px; font-size: 0.8rem; color: #aaa; }
  </style>
</head>
<body>
  <h1>VPOS Docs</h1>
  <p>Official documents for VPOS by Value Tech Solutions</p>
  <div class="grid">
    <a class="card" href="legal/privacy-policy.html">
      <div class="icon">🔐</div>
      <strong>Privacy Policy</strong>
      <span>VPOS Admin App</span>
    </a>
    <!-- Add more document cards here as needed -->
  </div>
  <footer>&copy; 2026 Value Tech Solutions</footer>
</body>
</html>
